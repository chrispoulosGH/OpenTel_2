# ============================================================
# Prometheus Config (Phase 1 / Slim)
# ============================================================
# Accepts remote-write from the central OTel collector.
# No scrape targets — all data arrives via remote write.
# ============================================================

global:
  scrape_interval: 30s
  evaluation_interval: 30s

# Remote write receiver is enabled via --web.enable-remote-write-receiver CLI flag

# Minimal self-scrape so Prometheus monitors itself
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
