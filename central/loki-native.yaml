auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: C:/code/openTel_2/central/bin/loki-data
  instance_addr: 127.0.0.1
  storage:
    filesystem:
      chunks_directory: C:/code/openTel_2/central/bin/loki-data/chunks
      rules_directory: C:/code/openTel_2/central/bin/loki-data/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true

ruler:
  alertmanager_url: http://localhost:9093
