# ============================================================
# Docker Compose — Central Stack (Phase 1 / Slim)
# ============================================================
# Brings up: OTel Collector + Prometheus + Tempo + Loki + Grafana
# Usage:  docker compose up -d
# ============================================================

services:
  # --- OTel Collector (central) ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (agents connect here)
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health check
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # --- Tempo ---
  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo-docker.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4320:4320"
      - "4321:4321"
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Loki ---
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  # --- Grafana ---
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
